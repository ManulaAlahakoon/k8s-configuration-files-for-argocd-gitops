apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-application-demo
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/ManulaAlahakoon/k8s-configuration-files-for-argocd-gitops.git
    targetRevision: HEAD
    path: dev
  destination:
    server:  https://kubernetes.default.svc
    namespace: argocd-demo-namespace

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
     
    automated:
      selfHeal: true
      prune: true
